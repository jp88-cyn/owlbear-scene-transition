<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <title>Scene Transition</title>

    <script type="module" src="/src/main.ts"></script>
</head>

<body>

    <h2>🎬 Scene Transition</h2>

    <p>Escolha um vídeo:</p>

    <input
        id="videoId"
        type="number"
        min="1"
        max="5"
        value="5">

    <p>

        1 = Midnight Channel<br>
        2 = TV Static<br>
        3 = Fog Entrance legal do mal<br>
        4 = Dungeon Transition<br>
        5 = Aleatório 
    </p>

    <button id="start">
        Iniciar Transição
    </button>

    <br><br>

    <button id="stop">
        Parar Transição
    </button>

</body>

</html>
